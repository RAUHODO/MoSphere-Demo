<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <script>
  // UA 分流 + localStorage 偏好覆盖
  (function(){
    var pref = null;
    try { pref = localStorage.getItem('demo_view'); } catch(e){}
    if (pref === 'desktop') { location.replace('desktop.html'); return; }
    if (!pref) {
      var isMobile = /Mobi|Android|iPhone|iPad|iPod/i.test(navigator.userAgent);
      if (!isMobile) { location.replace('desktop.html'); return; }
    }
  })();
  </script>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MoSphere · Site of Grace Demo</title>
  <link rel="stylesheet" href="css/style.css?v=20260427v">
</head>
<body>
  <header id="header">
    <div class="title-box">
      <h1 id="main-title"></h1>
      <div id="header-subtitle"></div>
    </div>
    <div class="view-switch" id="view-switch">
      <button type="button" class="view-opt active" data-view="mobile">📱 手机版</button>
      <button type="button" class="view-opt" data-view="desktop">🖥️ 桌面版</button>
    </div>
    <div class="lang-switch" id="lang-switch">
      <button type="button" class="lang-opt" data-lang="cn" onclick="setLang('cn')">中</button>
      <button type="button" class="lang-opt" data-lang="en" onclick="setLang('en')">EN</button>
    </div>
  </header>

  <main>
    <!-- Conversation Demo (手机版特供，放最顶) -->
    <section id="conversation-section">
      <div class="accordion" id="conv-accordion"></div>
    </section>

    <!-- Accordion Content (SECTIONS) -->
    <section id="content-section">
      <div class="accordion" id="accordion"></div>
    </section>

    <!-- Building Panel (cards 放下面，对齐 live 顺序) -->
    <section id="buildings-section">
      <div id="buildings-grid"></div>
      <div class="building-detail" id="building-detail" style="display:none"></div>
    </section>

    <!-- Status bar (footer) -->
    <div class="status-bar" id="status-bar"></div>
  </main>

  <footer>
    <p id="footer-text">Demo with fictional data. MoSphere is a personal AI OS project.</p>
  </footer>

  <script src="js/app.js?v=20260427grace"></script>
</body>
</html>
